on:
  workflow_call:

jobs:
  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    container:
      image: node:24-alpine
    steps:
      - name: "Download build-tests artifact"
        uses: actions/download-artifact@v4
        with:
          name: artifacts-tests
          path: ./test_artifacts

      - name: "📦 Install tools"
        run: |
          apk add --no-cache \
            'mozjs~140'      \
            'nodejs~24'      \
            openjdk21        \
            php84-cli

      - name: "🧩 Run tests"
        working-directory: test_artifacts
        run: |
          chmod +x ./wasm2lang_run_tests.sh
          which jshell
          SPIDERMONKEY_JS=/usr/bin/js140 \
          PHP_CLI=/usr/bin/php           \
          JSHELL_CLI=/usr/bin/jshell     \
          ./wasm2lang_run_tests.sh